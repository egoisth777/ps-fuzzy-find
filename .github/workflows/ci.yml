name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore FuzzyPath.slnx

      - name: Build
        run: dotnet build FuzzyPath.slnx --no-restore --configuration Debug

      - name: Test (unit tests only)
        run: dotnet test FuzzyPath.slnx --no-build --configuration Debug --filter "Category!=Integration" --verbosity normal
